<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Initiate Mission | UROOJ FATIMA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        body { background-color: #050505; color: #e5e2e1; zoom: 0.9; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-focus:focus { border-color: #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); }
    </style>
</head>

<body class="font-[Manrope] selection:bg-cyan-500/30">
    <!-- Cyber Background grid -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:40px_40px]"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-cyan-500/5 blur-[120px] rounded-full"></div>
    </div>

    <div class="relative z-10 min-h-screen flex flex-col">
        <!-- Minimal Nav -->
        <header class="p-8 flex justify-between items-center max-w-7xl mx-auto w-full">
            <a href="/" class="flex items-center gap-2 text-zinc-500 hover:text-white transition-colors group">
                <span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
                <span class="font-mono text-[10px] uppercase tracking-widest">Return_to_Station</span>
            </a>
            <div class="font-[Outfit] text-xl font-black text-white">&lt;UROOJ/&gt;</div>
        </header>

        <main class="flex-grow flex items-center justify-center p-6">
            <div class="max-w-4xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <!-- Content -->
                <div class="space-y-8">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-400/10 border border-cyan-400/20">
                        <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
                        <span class="text-[10px] font-mono text-cyan-400 uppercase tracking-widest">Protocol: Mission_Briefing</span>
                    </div>
                    <h1 class="text-6xl font-[Outfit] font-black text-white leading-[0.9] tracking-tighter">
                        Initiate <br> <span class="text-cyan-400">Mission</span>
                    </h1>
                    <p class="text-zinc-500 text-sm leading-relaxed max-w-sm">
                        Ready to automate your logic? Fill out the parameters below to initialize collaboration.
                    </p>
                    <div class="pt-6 border-t border-white/5 space-y-4">
                        <div class="flex items-center gap-4 text-xs font-mono text-zinc-500 hover:text-cyan-400 transition-colors cursor-default">
                            <span class="material-symbols-outlined text-sm">mail</span>
                            <span>uroojf199@gmail.com</span>
                        </div>
                    </div>
                </div>

                <!-- Form -->
                <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">
                    <form action="https://api.web3forms.com/submit" method="POST" id="project-form" class="space-y-4">
                        <input type="hidden" name="access_key" value="9076f2e0-3235-4730-8035-6547754bd892">
                        
                        <div class="space-y-2">
                            <label class="font-mono text-[10px] uppercase text-zinc-500 tracking-widest">Client Name</label>
                            <input type="text" name="name" required placeholder="IDENTIFY_SELF" 
                                class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-zinc-700 outline-none transition-all focus:border-cyan-400/50 focus:ring-1 focus:ring-cyan-400/20">
                        </div>

                        <div class="space-y-2">
                            <label class="font-mono text-[10px] uppercase text-zinc-500 tracking-widest">Comms Interface</label>
                            <input type="email" name="email" required placeholder="EMAIL_ADDRESS" 
                                class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-zinc-700 outline-none transition-all focus:border-cyan-400/50 focus:ring-1 focus:ring-cyan-400/20">
                        </div>

                        <div class="space-y-2">
                            <label class="font-mono text-[10px] uppercase text-zinc-500 tracking-widest">Mission Parameters</label>
                            <select name="service" required 
                                class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white outline-none transition-all focus:border-cyan-400/50 focus:ring-1 focus:ring-cyan-400/20 appearance-none">
                                <option value="ai-agents">Autonomous AI Agents</option>
                                <option value="n8n">n8n Workflow Automation</option>
                                <option value="mvp">Rapid AI MVP</option>
                                <option value="other">Other Synthetic Solutions</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="font-mono text-[10px] uppercase text-zinc-500 tracking-widest">Briefing Details</label>
                            <textarea name="message" rows="4" placeholder="DESCRIBE_PROJECT_LOGIC..." 
                                class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-zinc-700 outline-none transition-all focus:border-cyan-400/50 focus:ring-1 focus:ring-cyan-400/20"></textarea>
                        </div>

                        <button type="submit" id="submit-btn" class="w-full py-4 bg-cyan-400 text-black font-black font-[Outfit] rounded-xl hover:bg-white transition-all uppercase text-xs tracking-[0.2em] shadow-[0_10px_30px_-10px_rgba(34,211,238,0.4)]">
                            Submit Protocol
                        </button>
                        <p id="form-status" class="text-[10px] font-mono text-center mt-4 uppercase tracking-widest hidden"></p>
                    </form>
                </div>
            </div>
        </main>

        <footer class="p-8 text-center">
            <p class="font-mono text-[8px] text-zinc-700 uppercase tracking-[0.4em]">© 2026 UROOJ FATIMA // SYSTEMS_READY</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('project-form');
        const status = document.getElementById('form-status');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = 'TRANSMITTING...';

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            status.classList.remove('hidden');
            status.style.color = '#22d3ee';
            status.textContent = "INITIALIZING_UPLOAD...";

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: json
            })
            .then(async (response) => {
                let json = await response.json();
                if (response.status == 200) {
                    status.style.color = '#4ADE80';
                    status.textContent = "TRANSMISSION_SUCCESSFUL // COMS_ESTABLISHED";
                    btn.textContent = 'MISSION_LOCKED';
                    form.reset();
                } else {
                    status.style.color = '#FF4B4B';
                    status.textContent = "TRANSMISSION_ERROR: " + json.message;
                    btn.disabled = false;
                    btn.textContent = 'RETRY_SUBMISSION';
                }
            })
            .catch(error => {
                status.style.color = '#FF4B4B';
                status.textContent = "SYSTEM_FAULT: TRY_DIRECT_MAIL";
                btn.disabled = false;
                btn.textContent = 'RETRY_SUBMISSION';
            });
        });
    </script>
</body>
</html>
